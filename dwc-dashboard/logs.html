<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWC - System Logs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-spider"></i> DWC System</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-chart-pie"></i> Overview</a></li>
                <li class="active"><a href="logs.html"><i class="fas fa-terminal"></i> System Logs</a></li>
                <li><a href="data.html"><i class="fas fa-database"></i> Data Explorer</a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> Settings & Control</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <div class="header-title">
                    <h1>System Logs</h1>
                    <p class="subtitle">Live stream of system events, warnings, and errors</p>
                </div>
                <div class="header-actions" style="display: flex; gap: 10px;">
                    <button class="btn-outline" style="color: var(--danger); border-color: var(--danger);"><i class="fas fa-trash"></i> Clear</button>
                </div>
            </header>

            <div class="bento-grid">
                
                <div class="bento-card filter-bar span-4" style="margin-bottom: 20px;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search logs by keyword, URL, or error code..." id="logSearch">
                    </div>
                    <div class="filter-group">
                        <select class="custom-select" id="logLevel">
                            <option value="ALL">All Levels</option>
                            <option value="INFO">INFO Only</option>
                            <option value="WARN">WARNINGS</option>
                            <option value="ERROR">ERRORS</option>
                        </select>
                        <select class="custom-select" id="logSource">
                            <option value="ALL">All Sources</option>
                            <option value="MASTER">Master Node</option>
                            <option value="WORKER">Workers</option>
                            <option value="REDIS">Redis Queue</option>
                        </select>
                        <button class="btn-apply-filter">
                            <i class="fas fa-filter"></i> Filter
                        </button>
                    </div>
                </div>

                <div class="bento-card span-4" style="padding: 0; background-color: #0F172A; overflow: hidden;">
                    <div class="terminal-header">
                        <div class="terminal-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="terminal-title">live-server-log.log</div>
                        <div class="terminal-actions">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    
                    <div class="terminal-window">
                        <ul class="log-stream">
                            
                        </ul>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script>
        let isPaused = false;
        let logInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            // Lấy log lần đầu
            fetchLogs();
            
            // Cứ 1.5 giây lấy log mới một lần (tạo cảm giác live stream)
            logInterval = setInterval(() => {
                if (!isPaused) fetchLogs();
            }, 1500);

            // NÚT CLEAR
            const btnClear = document.querySelector('.fa-trash').parentElement;
            btnClear.addEventListener('click', async () => {
                await fetch('http://127.0.0.1:8080/api/logs', { method: 'DELETE' });
                document.querySelector('.log-stream').innerHTML = ''; // Xóa sạch màn hình
            });

            // Gắn sự kiện cho các ô Lọc
            document.getElementById('logSearch').addEventListener('input', applyFilter);
            document.getElementById('logLevel').addEventListener('change', applyFilter);
            document.getElementById('logSource').addEventListener('change', applyFilter);
        });

        // HÀM LẤY LOG VÀ VẼ LÊN MÀN HÌNH
        async function fetchLogs() {
            try {
                const res = await fetch('http://127.0.0.1:8080/api/logs');
                const logs = await res.json();
                
                const terminalWindow = document.querySelector('.terminal-window');
                const stream = document.querySelector('.log-stream');
                
                // 1. ĐO VỊ TRÍ THANH CUỘN (Smart Scrolling)
                // Kiểm tra xem người dùng có đang ở dưới cùng của màn hình log không (cho phép sai số 50px)
                const isScrolledToBottom = terminalWindow.scrollHeight - terminalWindow.clientHeight <= terminalWindow.scrollTop + 50;
                
                // 2. DOM BUFFERING (Chống Lag)
                // Thay vì += thẳng vào stream gây giật, ta gom tất cả vào một biến String
                let htmlBuffer = ''; 
                
                logs.forEach(log => {
                    let lvlColor = '#3b82f6'; // Mặc định INFO (Xanh)
                    if(log.level === 'WARN') lvlColor = '#f59e0b'; // Vàng
                    if(log.level === 'ERROR') lvlColor = '#ef4444'; // Đỏ

                    htmlBuffer += `
                        <li class="log-line" data-level="${log.level}" data-source="${log.source}">
                            <span class="log-time" style="color: #64748b;">${log.time}</span>
                            <span class="log-level" style="color: ${lvlColor}; font-weight: 700; width: 50px; display: inline-block;">${log.level}</span>
                            <span class="log-source" style="color: #a78bfa; font-weight: 600;">[${log.source}]</span>
                            <span class="log-message" style="color: #e2e8f0; margin-left: 10px;">${log.message}</span>
                        </li>
                    `;
                });
                
                // Đổ dữ liệu 1 lần duy nhất vào DOM (Tốc độ bàn thờ, không giật màn hình)
                stream.innerHTML = htmlBuffer; 
                
                applyFilter(); // Chạy bộ lọc
                
                // 3. ÁP DỤNG CUỘN THÔNG MINH
                // Chỉ tự động cuộn xuống đáy NẾU trước đó người dùng đang ở đáy
                // Nếu người dùng đang lướt lên xem log cũ, không làm phiền họ
                if (isScrolledToBottom) {
                    terminalWindow.scrollTop = terminalWindow.scrollHeight;
                }
                
            } catch (error) {}
        }

        // HÀM LỌC LOG MƯỢT MÀ
        function applyFilter() {
            const keyword = document.getElementById('logSearch').value.toLowerCase();
            const level = document.getElementById('logLevel').value;
            const source = document.getElementById('logSource').value;
            
            document.querySelectorAll('.log-line').forEach(line => {
                const text = line.innerText.toLowerCase();
                const lineLvl = line.getAttribute('data-level');
                const lineSrc = line.getAttribute('data-source').toUpperCase();
                
                let matchSearch = text.includes(keyword);
                let matchLevel = (level === 'ALL' || lineLvl === level);
                let matchSource = (source === 'ALL' || lineSrc.includes(source));
                
                if (matchSearch && matchLevel && matchSource) {
                    line.style.display = 'block';
                } else {
                    line.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
